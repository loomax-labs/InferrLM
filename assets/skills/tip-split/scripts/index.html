<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>
<script>
function parseInput(input) {
  if (!input) return {};
  let raw = input;
  if (typeof input === 'object' && input !== null) {
    if ('data' in input) raw = input.data;
    else if (!('skillId' in input)) return input;
    else raw = input.data;
  }
  if (typeof raw === 'string') {
    const t = raw.trim();
    if (!t) return {};
    try { return JSON.parse(t); } catch { return { text: t }; }
  }
  return raw || {};
}

function money(n) {
  return Math.round(n * 100) / 100;
}

window.runSkill = async function(input) {
  const params = parseInput(input);
  const total = Number(params.total);
  const tipPercent = Number(params.tipPercent ?? 15);
  const people = Math.max(1, Math.floor(Number(params.people ?? 1)));

  if (!Number.isFinite(total) || total < 0) {
    return { error: 'invalid_total' };
  }
  if (!Number.isFinite(tipPercent) || tipPercent < 0) {
    return { error: 'invalid_tip' };
  }

  const tip = money(total * (tipPercent / 100));
  const grand = money(total + tip);
  const each = money(grand / people);

  return {
    result: [
      'Bill: ' + money(total),
      'Tip (' + tipPercent + '%): ' + tip,
      'Total: ' + grand,
      'Per person (' + people + '): ' + each,
    ].join('\n'),
  };
};
</script>
</body>
</html>

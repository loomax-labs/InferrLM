<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>
<script>
function parseInput(input) {
  if (!input) return {};
  let raw = input;
  if (typeof input === 'object' && input !== null) {
    if ('data' in input) raw = input.data;
    else if (!('skillId' in input)) return input;
    else raw = input.data;
  }
  if (typeof raw === 'string') {
    const t = raw.trim();
    if (!t) return {};
    try { return JSON.parse(t); } catch { return { text: t }; }
  }
  return raw || {};
}

const lengthToM = {
  m: 1, meter: 1, meters: 1,
  km: 1000, kilometer: 1000, kilometers: 1000,
  cm: 0.01, centimeter: 0.01, centimeters: 0.01,
  mm: 0.001, millimeter: 0.001, millimeters: 0.001,
  mi: 1609.344, mile: 1609.344, miles: 1609.344,
  ft: 0.3048, foot: 0.3048, feet: 0.3048,
  in: 0.0254, inch: 0.0254, inches: 0.0254,
  yd: 0.9144, yard: 0.9144, yards: 0.9144,
};

const weightToKg = {
  kg: 1, kilogram: 1, kilograms: 1,
  g: 0.001, gram: 0.001, grams: 0.001,
  mg: 0.000001, milligram: 0.000001, milligrams: 0.000001,
  lb: 0.45359237, lbs: 0.45359237, pound: 0.45359237, pounds: 0.45359237,
  oz: 0.028349523125, ounce: 0.028349523125, ounces: 0.028349523125,
};

const dataToB = {
  b: 1, byte: 1, bytes: 1,
  kb: 1024, kilobyte: 1024, kilobytes: 1024,
  mb: 1048576, megabyte: 1048576, megabytes: 1048576,
  gb: 1073741824, gigabyte: 1073741824, gigabytes: 1073741824,
  tb: 1099511627776, terabyte: 1099511627776, terabytes: 1099511627776,
};

function norm(unit) {
  return String(unit || '').trim().toLowerCase();
}

function convertLinear(value, from, to, table) {
  const f = table[norm(from)];
  const t = table[norm(to)];
  if (f == null || t == null) return null;
  return (value * f) / t;
}

function convertTemp(value, from, to) {
  const f = norm(from);
  const t = norm(to);
  let c = value;
  if (f === 'f' || f === 'fahrenheit') c = (value - 32) * (5 / 9);
  else if (f === 'k' || f === 'kelvin') c = value - 273.15;
  else if (f !== 'c' && f !== 'celsius') return null;
  if (t === 'f' || t === 'fahrenheit') return c * (9 / 5) + 32;
  if (t === 'k' || t === 'kelvin') return c + 273.15;
  if (t === 'c' || t === 'celsius') return c;
  return null;
}

window.runSkill = async function(input) {
  const params = parseInput(input);
  const value = Number(params.value);
  const from = params.from;
  const to = params.to;
  const category = norm(params.category);

  if (!Number.isFinite(value) || !from || !to) {
    return { error: 'invalid_params' };
  }

  let out = null;
  const cat = category || (lengthToM[norm(from)] && lengthToM[norm(to)] ? 'length'
    : weightToKg[norm(from)] && weightToKg[norm(to)] ? 'weight'
    : dataToB[norm(from)] && dataToB[norm(to)] ? 'data' : 'temp');

  if (cat === 'length') out = convertLinear(value, from, to, lengthToM);
  else if (cat === 'weight') out = convertLinear(value, from, to, weightToKg);
  else if (cat === 'data') out = convertLinear(value, from, to, dataToB);
  else out = convertTemp(value, from, to);

  if (out == null || !Number.isFinite(out)) {
    return { error: 'unsupported_units' };
  }

  const rounded = Math.round(out * 1e6) / 1e6;
  return {
    result: value + ' ' + from + ' = ' + rounded + ' ' + to,
  };
};
</script>
</body>
</html>

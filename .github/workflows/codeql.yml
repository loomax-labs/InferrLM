name: codeql

on:
  pull_request:
    branches: [main, development]
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: init_codeql
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: analyze
        uses: github/codeql-action/analyze@v3

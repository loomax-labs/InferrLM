name: quality

on:
  pull_request:
    branches: [main, development]
  push:
    branches: [development]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: install_deps
        run: yarn install --frozen-lockfile

      - name: lint
        run: yarn lint

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: install_deps
        run: yarn install --frozen-lockfile

      - name: typecheck
        run: npx tsc --noEmit

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: install_deps
        run: yarn install --frozen-lockfile

      - name: audit
        run: yarn audit --level moderate
        continue-on-error: true

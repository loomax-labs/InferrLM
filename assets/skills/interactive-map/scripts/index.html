<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"></head><body><script>

function parseInput(input) {
  if (!input) return {};
  let raw = input;
  if (typeof input === 'object' && input !== null) {
    if ('data' in input) raw = input.data;
    else if (!('skillId' in input)) return input;
    else raw = input.data;
  }
  if (typeof raw === 'string') {
    const t = raw.trim();
    if (!t) return {};
    try { return JSON.parse(t); } catch { return { text: t }; }
  }
  return raw || {};
}
function toDataUrl(html) {
  return 'data:text/html;charset=utf-8,' + encodeURIComponent(html);
}

window.runSkill = async function(input) {
  try {
    const jsonData = parseInput(input);
    const location = jsonData.location;
    if (!location) return { error: 'No location provided.' };
    const encodedLocation = encodeURIComponent(location);
    return { webview: { url: 'https://maps.google.com/maps?q=' + encodedLocation + '&output=embed' } };
  } catch (e) {
    return { error: 'Failed to query location on map: ' + e.message };
  }
};
</script></body></html>

<!doctype html><html><head><meta charset="UTF-8"></head><body><script>
function toDataUrl(html){return 'data:text/html;charset=utf-8,'+encodeURIComponent(html);}
const PIANO_HTML = "<!--\n@license\nCopyright 2026 Google LLC\n\nLicensed under the Apache License, Version 2.0 (the \"License\");\nyou may not use this file except in compliance with the License.\nYou may obtain a copy of the License at\n\n    http://www.apache.org/licenses/LICENSE-2.0\n\nUnless required by applicable law or agreed to in writing, software\ndistributed under the License is distributed on an \"AS IS\" BASIS,\nWITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.\nSee the License for the specific language governing permissions and\nlimitations under the License.\n==============================================================================\n-->\n\n<!doctype html>\n<html lang=\"en\">\n  <head>\n    <meta charset=\"UTF-8\" />\n    <meta\n      name=\"viewport\"\n      content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no\"\n    />\n    <title>3D 88-Key Virtual Piano</title>\n    <style>\n      body {\n        margin: 0;\n        background-color: #1e1e2f;\n        display: flex;\n        align-items: center;\n        height: 100vh;\n        overflow-y: hidden;\n      }\n\n      #piano-scroll-container {\n        width: 100%;\n        overflow-x: auto;\n        white-space: nowrap;\n        -ms-overflow-style: none;\n        scrollbar-width: none;\n        padding: 20px;\n        touch-action: pan-x;\n      }\n      #piano-scroll-container::-webkit-scrollbar {\n        display: none;\n      }\n\n      #piano {\n        display: inline-flex;\n        flex-direction: column;\n        background: #222;\n        padding: 10px 10px 0 10px;\n        border-radius: 12px;\n        box-shadow:\n          0 10px 30px rgba(0, 0, 0, 0.8),\n          inset 0 2px 5px rgba(255, 255, 255, 0.1);\n      }\n\n      #key-container {\n        display: flex;\n        position: relative;\n      }\n\n      /* THE FIX: Explicitly lock the wrapper to 60px and remove the z-index bias! */\n      .key-group {\n        position: relative;\n        display: block;\n        width: 60px;\n        flex-shrink: 0;\n      }\n\n      #scroll-lip {\n        height: 60px;\n        background: linear-gradient(to bottom, #333, #1a1a1a);\n        border-top: 2px solid #111;\n        border-radius: 0 0 10px 10px;\n        display: flex;\n        align-items: center;\n        justify-content: center;\n        margin: 0 -10px;\n        color: #666;\n        font-family: sans-serif;\n        font-size: 16px;\n        font-weight: bold;\n        letter-spacing: 3px;\n        user-select: none;\n        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5);\n      }\n\n      /* White Keys */\n      .key.white {\n        touch-action: pan-x;\n        width: 100%;\n        height: 250px; /* Takes up exactly the 60px of its fair wrapper */\n        background: linear-gradient(to bottom, #ffffff 80%, #f0f0f0 100%);\n        box-sizing: border-box;\n        border-right: 1px solid #ccc;\n        border-bottom: 2px solid #bbb;\n        border-radius: 0 0 6px 6px;\n        box-shadow: 0 4px 5px rgba(0, 0, 0, 0.2);\n        cursor: pointer;\n        -webkit-tap-highlight-color: transparent;\n        display: flex;\n        align-items: flex-end;\n        justify-content: center;\n        padding-bottom: 15px;\n        font-family: sans-serif;\n        font-size: 14px;\n        font-weight: bold;\n        color: #aaa;\n        user-select: none;\n        position: relative;\n        z-index: 1; /* All white keys are equal! */\n      }\n      .key-group:first-child .key.white {\n        border-left: 1px solid #ccc;\n      }\n\n      .key.white:active,\n      .key.white.active {\n        background: #e0e0e0;\n        box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.4);\n        color: #333;\n      }\n\n      /* Black Keys */\n      .key.black {\n        touch-action: pan-x;\n        width: 30px;\n        height: 140px;\n        background: linear-gradient(to bottom, #444, #000);\n        position: absolute;\n        right: -15px; /* Sits perfectly in the middle of the borders */\n        top: 0;\n        z-index: 10; /* All black keys sit safely on top */\n        box-sizing: border-box;\n        border-radius: 0 0 5px 5px;\n        border: 1px solid #111;\n        border-bottom: 3px solid #000;\n        box-shadow: 2px 4px 6px rgba(0, 0, 0, 0.5);\n        cursor: pointer;\n        -webkit-tap-highlight-color: transparent;\n      }\n\n      .key.black:active,\n      .key.black.active {\n        background: #111;\n        box-shadow: inset 0 3px 6px rgba(0, 0, 0, 0.9);\n      }\n    </style>\n  </head>\n  <body>\n    <div id=\"piano-scroll-container\">\n      <div id=\"piano\">\n        <div id=\"key-container\"></div>\n        <div id=\"scroll-lip\">⟷ SLIDE HERE TO SCROLL ⟷</div>\n      </div>\n    </div>\n\n    <script>\n      const keyContainer = document.getElementById(\"key-container\");\n      let noteNumber = 1;\n      const noteNamesArray = [\"C\", \"C#\", \"D\", \"D#\", \"E\", \"F\", \"F#\", \"G\", \"G#\", \"A\", \"A#\", \"B\"];\n\n      // 1. GENERATE THE KEYS (No more biased Z-Index loop!)\n      while (noteNumber <= 88) {\n        const group = document.createElement(\"div\");\n        group.className = \"key-group\";\n\n        const cOffset = (noteNumber + 8) % 12;\n        const noteName = noteNamesArray[cOffset];\n        const octave = Math.floor((noteNumber + 8) / 12);\n\n        const whiteKey = document.createElement(\"div\");\n        whiteKey.className = \"key white\";\n        whiteKey.setAttribute(\"data-note\", noteNumber);\n        whiteKey.innerText = noteName + octave;\n        group.appendChild(whiteKey);\n\n        if (cOffset !== 4 && cOffset !== 11 && noteNumber !== 88) {\n          noteNumber++;\n          const blackKey = document.createElement(\"div\");\n          blackKey.className = \"key black\";\n          blackKey.setAttribute(\"data-note\", noteNumber);\n          group.appendChild(blackKey);\n        }\n\n        keyContainer.appendChild(group);\n        noteNumber++;\n      }\n\n      // 2. THE AUDIO ENGINE\n      const audioNotes = {};\n      for (let i = 1; i <= 88; i++) {\n        const audioUrl = `assets/${i}.mp3`;\n        audioNotes[i] = new Audio(audioUrl);\n      }\n\n      const keys = document.querySelectorAll(\".key\");\n\n      keys.forEach((key) => {\n        key.addEventListener(\"pointerdown\", function (event) {\n          event.stopPropagation();\n\n          const note = this.getAttribute(\"data-note\");\n          const audio = audioNotes[note];\n\n          if (audio) {\n            audio.currentTime = 0;\n            audio.play().catch((e) => console.warn(\"Waiting for audio:\", e));\n\n            this.classList.add(\"active\");\n\n            setTimeout(() => {\n              audio.pause();\n              audio.currentTime = 0;\n            }, 2000);\n          }\n        });\n\n        key.addEventListener(\"pointerup\", function () {\n          this.classList.remove(\"active\");\n        });\n        key.addEventListener(\"pointerleave\", function () {\n          this.classList.remove(\"active\");\n        });\n        key.addEventListener(\"pointercancel\", function () {\n          this.classList.remove(\"active\");\n        });\n      });\n\n      // 3. AUTO-SCROLL TO MIDDLE C\n      setTimeout(() => {\n        const middleC = document.querySelector('.key.white[data-note=\"40\"]');\n        if (middleC) {\n          middleC.scrollIntoView({ behavior: \"auto\", inline: \"center\", block: \"nearest\" });\n        }\n      }, 50);\n    </script>\n  </body>\n</html>\n";
window.runSkill = async function(){return {webview:{url:toDataUrl(PIANO_HTML)},result:'Tap the preview card to play the piano.'};};
</script></body></html>

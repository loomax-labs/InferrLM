<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>
<script>
function parseInput(input) {
  if (!input) return {};
  let raw = input;
  if (typeof input === 'object' && input !== null) {
    if ('data' in input) raw = input.data;
    else if (!('skillId' in input)) return input;
    else raw = input.data;
  }
  if (typeof raw === 'string') {
    const t = raw.trim();
    if (!t) return {};
    try { return JSON.parse(t); } catch { return { text: t }; }
  }
  return raw || {};
}

function toBase64(text) {
  const bytes = new TextEncoder().encode(text);
  let bin = '';
  bytes.forEach(b => { bin += String.fromCharCode(b); });
  return btoa(bin);
}

function fromBase64(text) {
  const bin = atob(text);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

window.runSkill = async function(input) {
  const params = parseInput(input);
  const action = String(params.action || '').toLowerCase();
  const text = String(params.text ?? '');
  if (!action) return { error: 'missing_action' };

  try {
    if (action === 'base64_encode') {
      return { result: toBase64(text) };
    }
    if (action === 'base64_decode') {
      return { result: fromBase64(text.trim()) };
    }
    if (action === 'uri_encode') {
      return { result: encodeURIComponent(text) };
    }
    if (action === 'uri_decode') {
      return { result: decodeURIComponent(text) };
    }
    return { error: 'unknown_action' };
  } catch {
    return { error: 'decode_failed' };
  }
};
</script>
</body>
</html>
